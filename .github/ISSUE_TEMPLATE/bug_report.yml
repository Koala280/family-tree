name: Bug report
description: Report a reproducible issue
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
      placeholder: Example - Birth date input lags on mobile
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps
      placeholder: |
        1. Open table view
        2. Edit person X
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, app version/commit
      placeholder: Chrome 131, Android 14, Pixel 8
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Screenshots / logs
      description: Add screenshots or relevant console output if available

